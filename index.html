<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC Test Client</title>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script type="module">
  // Load mediasoup-client as ES module and expose on window for the main script
  import * as mediasoupClient from 'https://esm.sh/mediasoup-client@3.7.12';
  window.mediasoupClient = mediasoupClient;
  window.dispatchEvent(new Event('mediasoup-ready'));
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #555570;
    --danger: #ff4455;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0;
  }

  /* ── HEADER ── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  #status-dot.error { background: var(--danger); }
  #status-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-left: -8px;
  }

  /* ── MAIN LAYOUT ── */
  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    overflow: hidden;
    height: calc(100vh - 53px - 48px);
  }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
  }

  .panel {
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }
  .panel-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 8px 10px;
    border-radius: 4px;
    outline: none;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    border: none;
    border-radius: 4px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    margin-bottom: 6px;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--muted); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  .btn-row { display: flex; gap: 6px; }
  .btn-row button { margin-bottom: 0; }

  /* ── MEDIA TOGGLES ── */
  .toggle-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .toggle-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.7rem;
    padding: 6px 4px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
    width: auto;
    margin-bottom: 0;
  }
  .toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .toggle-btn.muted-active {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }

  /* ── PEERS LIST ── */
  #peers-list { display: flex; flex-direction: column; gap: 6px; }
  .peer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.75rem;
  }
  .peer-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .peer-name { flex: 1; color: var(--text); }
  .peer-badges { display: flex; gap: 4px; }
  .badge {
    font-size: 0.6rem;
    padding: 2px 5px;
    border-radius: 3px;
    background: var(--border);
    color: var(--muted);
  }
  .badge.on { background: var(--accent); color: #000; }

  /* ── MAIN CONTENT ── */
  .content {
    display: grid;
    grid-template-rows: auto 1fr 200px;
    overflow: hidden;
  }

  /* ── VIDEO GRID ── */
  #video-grid {
    background: var(--bg);
  }

  .video-tile {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 16/9;
  }
  .video-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-tile .tile-label {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 0.65rem;
    padding: 3px 7px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .video-tile .tile-badges {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
  }
  .tile-badge {
    background: rgba(0,0,0,0.75);
    color: var(--muted);
    font-size: 0.65rem;
    padding: 3px 6px;
    border-radius: 3px;
  }
  .tile-badge.warn { color: var(--danger); }

  .empty-state {
    grid-column: 1/-1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--muted);
    gap: 8px;
    text-align: center;
  }
  .empty-state .icon { font-size: 2rem; }
  .empty-state p { font-size: 0.75rem; }

  /* ── LOG PANEL ── */
  .log-panel {
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .log-header span {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .log-clear {
    font-size: 0.65rem;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    width: auto;
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .log-clear:hover { color: var(--text); }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-entry {
    font-size: 0.7rem;
    line-height: 1.5;
    display: flex;
    gap: 10px;
  }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg { color: var(--text); word-break: break-all; }
  .log-entry.info .log-msg { color: var(--text); }
  .log-entry.success .log-msg { color: var(--accent); }
  .log-entry.warn .log-msg { color: var(--accent2); }
  .log-entry.error .log-msg { color: var(--danger); }
  .log-entry.signal .log-msg { color: #7c8cff; }

  /* ── CHAT ── */
  .chat-input-row {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-input-row input {
    flex: 1;
    margin: 0;
  }
  .chat-input-row button {
    width: auto;
    margin: 0;
    padding: 8px 16px;
  }

  /* ── FOOTER ── */
  footer {
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.65rem;
    color: var(--muted);
  }
  #room-info { flex: 1; }
  #room-info span { color: var(--accent); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  /* ── TABS ── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 10px 18px;
    cursor: pointer;
    width: auto;
    margin: 0;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-pane { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-pane.active { display: flex; }

  /* ── MAP ── */
  #map {
    flex: 1;
    min-height: 0;
    background: #0d0d18;
  }
  .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1); }
  .leaflet-container { background: #0a0a0f; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }

  /* Location sidebar panel */
  .loc-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    margin-bottom: 10px;
    color: var(--muted);
  }
  .loc-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .loc-dot.sharing { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s infinite; }
  .loc-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .loc-coords {
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    margin-bottom: 8px;
    line-height: 1.6;
    min-height: 52px;
  }
  .loc-coords span { color: var(--accent); }

  .peer-loc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.7rem;
    margin-bottom: 5px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .peer-loc-item:hover { border-color: var(--accent); }
  .peer-loc-icon { font-size: 0.9rem; flex-shrink: 0; }
  .peer-loc-name { flex: 1; font-weight: 600; color: var(--text); }
  .peer-loc-coords { color: var(--muted); font-size: 0.62rem; line-height: 1.4; }

  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5) !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 0.72rem !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; }
  .popup-name { font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .popup-coords { color: var(--muted); line-height: 1.6; }
  .popup-time { color: var(--muted); font-size: 0.65rem; margin-top: 4px; }

  /* ── RECORDING ── */
  .rec-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    margin-bottom: 10px;
    color: var(--muted);
  }
  .rec-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .rec-dot.recording {
    background: var(--danger);
    box-shadow: 0 0 6px var(--danger);
    animation: pulse 1s infinite;
  }
  .rec-dot.uploading {
    background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
    animation: pulse 0.6s infinite;
  }
  .rec-meta {
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    margin-bottom: 8px;
    line-height: 1.7;
    min-height: 40px;
  }
  .rec-meta span { color: var(--accent); }
  .rec-meta a { color: var(--accent2); text-decoration: none; }
  .rec-meta a:hover { text-decoration: underline; }
  .rec-timer {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--danger);
    text-align: center;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    display: none;
  }
  .rec-timer.active { display: block; }

</style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>WebRTC Test Client</h1>
  <span id="status-label">disconnected</span>
</header>

<main>
  <!-- SIDEBAR -->
  <aside>
    <div class="panel">
      <div class="panel-title">Server</div>
      <input id="server-url" type="text" value="https://rtc.myhives.nl" placeholder="http://localhost:3000">
      <input id="jwt-token" type="text" placeholder="JWT token (optional)">
      <input id="guest-name" type="text" placeholder="Guest name (if no JWT)">
    </div>

    <div class="panel">
      <div class="panel-title">Room</div>
      <input id="room-code" type="text" placeholder="Room code e.g. ABC-123">
      <div class="btn-row">
        <button class="btn-primary" id="btn-join">Join</button>
        <button class="btn-danger" id="btn-leave" disabled>Leave</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Media</div>
      <div class="toggle-row">
        <button class="toggle-btn" id="btn-cam" disabled>📷 Cam</button>
        <button class="toggle-btn" id="btn-mic" disabled>🎙 Mic</button>
        <button class="toggle-btn" id="btn-screen" disabled>🖥 Screen</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Peers (<span id="peer-count">0</span>)</div>
      <div id="peers-list"></div>
    </div>

    <div class="panel" style="flex:1; overflow-y:auto;">
      <div class="panel-title">📍 Live Location</div>
      <div class="loc-status">
        <div class="loc-dot" id="loc-dot"></div>
        <span id="loc-status-label">not sharing</span>
      </div>
      <div class="loc-coords" id="loc-coords">—</div>
      <div class="btn-row" style="margin-bottom:8px;">
        <button class="toggle-btn" id="btn-loc-share" disabled>📍 Share</button>
        <button class="toggle-btn" id="btn-loc-stop" disabled style="display:none;">⏹ Stop</button>
      </div>
      <div class="panel-title" style="margin-top:8px;">Peers Sharing</div>
      <div id="peer-loc-list"><p style="font-size:0.7rem;color:var(--muted);">None yet</p></div>
    </div>

    <div class="panel" style="flex-shrink:0;">
      <div class="panel-title">⏺ Recording</div>
      <div class="rec-status">
        <div class="rec-dot" id="rec-dot"></div>
        <span id="rec-status-label">idle</span>
      </div>
      <div class="rec-timer" id="rec-timer">00:00:00</div>
      <div class="rec-meta" id="rec-meta">—</div>
      <div class="btn-row" style="margin-bottom:6px;">
        <button class="toggle-btn" id="btn-rec-start" disabled>⏺ Record</button>
        <button class="toggle-btn" id="btn-rec-stop" disabled style="display:none;">⏹ Stop</button>
      </div>
      <div class="btn-row">
        <button class="toggle-btn" id="btn-rec-upload" disabled style="display:none;">☁ Upload S3</button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="content">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('video')">📹 Video</button>
      <button class="tab-btn" onclick="switchTab('map')" id="tab-map-btn">🗺 Map</button>
    </div>

    <!-- VIDEO TAB -->
    <div class="tab-pane active" id="tab-video">
      <div id="video-grid" style="flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;padding:2px;align-content:start;">
        <div class="empty-state" id="empty-state">
          <div class="icon">📡</div>
          <p>Join a room to start a call</p>
        </div>
      </div>
    </div>

    <!-- MAP TAB -->
    <div class="tab-pane" id="tab-map">
      <div id="map"></div>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <span>Event Log</span>
        <button class="log-clear" onclick="clearLog()">clear</button>
      </div>
      <div id="log"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="In-call chat message..." disabled>
        <button class="btn-secondary" id="btn-chat" disabled>Send</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <div id="room-info">Not in a room</div>
  <div id="peer-stat">0 peers</div>
</footer>

<script>
// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
let socket = null;
let localStream = null;
let isScreenSharing = false;
let currentRoomId = null;
let currentRoomCode = null;


// ─────────────────────────────────────────────────────────
// RECORDING STATE
// ─────────────────────────────────────────────────────────
let isRecording = false;
let recordingPath = null;
let recordingTimerInterval = null;
let recordingStartTime = null;
let lastS3Url = null;

// SFU state
let device        = null;
let sendTransport = null;
let recvTransport = null;
let audioProducer = null;
let videoProducer = null;
const consumers   = {};   // consumerId → Consumer

// socketId → { name, isMuted, isVideoOff, isScreenSharing }
const peerMeta = {};

// ─────────────────────────────────────────────────────────
// LOGGING
// ─────────────────────────────────────────────────────────
function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0')}`;
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${msg}</span>`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

// ─────────────────────────────────────────────────────────
// STATUS DOT
// ─────────────────────────────────────────────────────────
function setStatus(state, label) {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-label');
  dot.className = state;
  lbl.textContent = label;
}

// ─────────────────────────────────────────────────────────
// VIDEO TILES
// ─────────────────────────────────────────────────────────
function addVideoTile(socketId, name, stream, isLocal = false) {
  document.getElementById('empty-state')?.remove();

  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = `tile-${socketId}`;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  if (isLocal) video.muted = true;
  if (stream) video.srcObject = stream;

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.textContent = isLocal ? `${name} (you)` : name;

  const badges = document.createElement('div');
  badges.className = 'tile-badges';
  badges.id = `badges-${socketId}`;

  tile.appendChild(video);
  tile.appendChild(label);
  tile.appendChild(badges);
  document.getElementById('video-grid').appendChild(tile);
}

function removeVideoTile(socketId) {
  document.getElementById(`tile-${socketId}`)?.remove();
  if (document.getElementById('video-grid').children.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'empty-state';
    empty.innerHTML = '<div class="icon">📡</div><p>No active streams</p>';
    document.getElementById('video-grid').appendChild(empty);
  }
}

function updateTileBadges(socketId, isMuted, isVideoOff, isScreenSharing) {
  const badges = document.getElementById(`badges-${socketId}`);
  if (!badges) return;
  badges.innerHTML = '';
  if (isMuted) badges.innerHTML += '<span class="tile-badge warn">🔇</span>';
  if (isVideoOff) badges.innerHTML += '<span class="tile-badge warn">📵</span>';
  if (isScreenSharing) badges.innerHTML += '<span class="tile-badge on">🖥</span>';
}

  }
}

// SFU HELPERS  (mediasoup-client)
// ─────────────────────────────────────────────────────────

/** Load mediasoup Device with router RTP capabilities */
async function loadDevice(rtpCapabilities) {
  const ms = window.mediasoupClient;
  if (!ms) throw new Error('mediasoup-client library not loaded — check CDN script tag');
  log(`RTP caps received: ${JSON.stringify(rtpCapabilities).slice(0,80)}…`, 'signal');
  device = new ms.Device();
  await device.load({ routerRtpCapabilities: rtpCapabilities });
  log(`Device loaded — canProduce(video)=${device.canProduce('video')} canProduce(audio)=${device.canProduce('audio')}`, 'success');
}

/**
 * Wait for the next 'transport:created' event matching a specific direction.
 * Fixes the race condition where Promise.all sends both transport:create
 * requests simultaneously and both once() handlers race for the same events.
 * We use a persistent 'on' listener that resolves only when direction matches,
 * then removes itself.
 */
function waitForTransportCreated(direction) {
  return new Promise((resolve) => {
    function handler(params) {
      if (params.direction === direction) {
        socket.off('transport:created', handler);
        resolve(params);
      }
    }
    socket.on('transport:created', handler);
  });
}

/**
 * Wait for transport:connected event matching a specific transportId.
 * Fixes shared socket.once('transport:connected') firing for wrong transport.
 */
function waitForTransportConnected(transportId) {
  return new Promise((resolve) => {
    function handler(data) {
      if (!data || !data.transportId || data.transportId === transportId) {
        socket.off('transport:connected', handler);
        resolve();
      }
    }
    socket.on('transport:connected', handler);
  });
}

/** Create send transport (browser → server) then produce local audio + video */
async function createSendTransport() {
  log('→ transport:create send', 'signal');
  socket.emit('transport:create', { direction: 'send' });
  const params = await waitForTransportCreated('send');
  log(`← transport:created send id=${params.id?.slice(0,8)} iceCandidates=${params.iceCandidates?.length}`, 'signal');

  sendTransport = device.createSendTransport(params);

  sendTransport.on('connectionstatechange', (s) => log(`SendTransport ICE: ${s}`, s==='connected'?'success':s==='failed'?'error':'info'));
  sendTransport.on('connect', ({ dtlsParameters }, cb, errb) => {
    log(`→ transport:connect send id=${sendTransport.id.slice(0,8)}`, 'signal');
    socket.emit('transport:connect', { transportId: sendTransport.id, dtlsParameters });
    waitForTransportConnected(sendTransport.id)
      .then(() => { log('← transport:connected send ✅', 'success'); cb(); })
      .catch(errb);
  });

  sendTransport.on('produce', ({ kind, rtpParameters, appData }, cb, errb) => {
    log(`→ transport:produce ${kind}`, 'signal');
    socket.emit('transport:produce', {
      transportId: sendTransport.id, kind, rtpParameters, appData,
    });
    socket.once('transport:produced', ({ producerId }) => {
      log(`← transport:produced ${kind} id=${producerId.slice(0,8)}`, 'signal');
      cb({ id: producerId });
    });
  });

  sendTransport.on('connectionstatechange', (state) => {
    log(`Send transport state: ${state}`, state === 'connected' ? 'success' : state === 'failed' ? 'error' : 'info');
  });

  if (localStream) {
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      log('Producing audio…', 'info');
      audioProducer = await sendTransport.produce({ track: audioTrack });
      log(`🎙 Audio producer: ${audioProducer.id.slice(0,8)} state=${audioProducer.paused?'paused':'active'}`, 'signal');
    }
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) {
      log('Producing video…', 'info');
      videoProducer = await sendTransport.produce({
        track: videoTrack,
        encodings: [{ maxBitrate: 900_000 }],
      });
      log(`📷 Video producer: ${videoProducer.id.slice(0,8)}`, 'signal');
    }
  } else {
    log('No localStream — no tracks to produce', 'warn');
  }

  log('Send transport ready ✅', 'success');
}

/** Create recv transport (server → browser) for receiving remote tracks */
async function createRecvTransport() {
  log('→ transport:create recv', 'signal');
  socket.emit('transport:create', { direction: 'recv' });
  const params = await waitForTransportCreated('recv');
  log(`← transport:created recv id=${params.id?.slice(0,8)} iceCandidates=${params.iceCandidates?.length}`, 'signal');

  recvTransport = device.createRecvTransport(params);

  recvTransport.on('connectionstatechange', (s) => log(`RecvTransport ICE: ${s}`, s==='connected'?'success':s==='failed'?'error':'info'));
  recvTransport.on('connect', ({ dtlsParameters }, cb, errb) => {
    log(`→ transport:connect recv id=${recvTransport.id.slice(0,8)}`, 'signal');
    socket.emit('transport:connect', { transportId: recvTransport.id, dtlsParameters });
    waitForTransportConnected(recvTransport.id)
      .then(() => { log('← transport:connected recv ✅', 'success'); cb(); })
      .catch(errb);
  });

  recvTransport.on('connectionstatechange', (state) => {
    log(`Recv transport state: ${state}`, state === 'connected' ? 'success' : state === 'failed' ? 'error' : 'info');
  });

  log('Recv transport ready ✅', 'success');
}

/**
 * Subscribe to a remote producer and attach its track to the peer's video tile.
 * Uses a persistent listener matched by producerId to avoid race conditions
 * when multiple producers are consumed in quick succession.
 */
async function subscribeToProducer(producerId, socketId, kind) {
  if (!recvTransport || !device) {
    log('Recv transport not ready — cannot subscribe', 'warn');
    return;
  }

  log(`→ transport:consume ${kind} producerId=${producerId.slice(0,8)}`, 'signal');
  socket.emit('transport:consume', {
    transportId:     recvTransport.id,
    producerId,
    rtpCapabilities: device.rtpCapabilities,
  });

  // Wait for the consumed response that matches our producerId
  const params = await new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      socket.off('transport:consumed', handler);
      reject(new Error(`transport:consumed timeout for producer ${producerId.slice(0,8)}`));
    }, 10000);

    function handler(data) {
      if (data.producerId === producerId) {
        clearTimeout(timer);
        socket.off('transport:consumed', handler);
        resolve(data);
      }
    }
    socket.on('transport:consumed', handler);

    // Also catch server errors
    socket.once('error', ({ message }) => {
      clearTimeout(timer);
      socket.off('transport:consumed', handler);
      reject(new Error(`Server error during consume: ${message}`));
    });
  });

  log(`← transport:consumed ${kind} consumerId=${params.id?.slice(0,8)}`, 'signal');

  try {
    const consumer = await recvTransport.consume(params);
    consumers[params.id] = consumer;

    socket.emit('consumer:resume', { consumerId: params.id });

    const name   = peerMeta[socketId]?.name || socketId.slice(0, 8);
    const stream = new MediaStream([consumer.track]);
    const tile   = document.getElementById(`tile-${socketId}`);

    log(`Attaching ${kind} track to tile-${socketId} (tile exists: ${!!tile})`, 'info');

    if (tile) {
      const video = tile.querySelector('video');
      if (video.srcObject) {
        video.srcObject.addTrack(consumer.track);
        log(`Added ${kind} track to existing stream on tile-${socketId}`, 'success');
      } else {
        video.srcObject = stream;
        log(`Set new ${kind} stream on tile-${socketId}`, 'success');
      }
    } else {
      log(`No tile for ${socketId} — creating one`, 'info');
      addVideoTile(socketId, name, stream);
    }

    consumer.on('trackended', () => log(`Track ended: ${kind} from ${socketId.slice(0,8)}`, 'warn'));
    log(`✅ Subscribed to ${kind} from ${name} (${socketId.slice(0,8)})`, 'success');
  } catch (err) {
    log(`Subscribe error: ${err.message}`, 'error');
    console.error('Subscribe error detail:', err);
  }
}

/** Clean up all SFU transports and producers */
function closeSfuTransports() {
  try { audioProducer?.close(); } catch (_) {}
  try { videoProducer?.close(); } catch (_) {}
  try { sendTransport?.close(); } catch (_) {}
  try { recvTransport?.close(); } catch (_) {}
  for (const c of Object.values(consumers)) { try { c.close(); } catch (_) {} }
  Object.keys(consumers).forEach(k => delete consumers[k]);
  audioProducer = null; videoProducer = null;
  sendTransport = null; recvTransport  = null;
  device        = null;
}

function closePeer(socketId) {
  delete peerMeta[socketId];
  removeVideoTile(socketId);
  renderPeers();
}

// ─────────────────────────────────────────────────────────
// CONNECT & JOIN
// ─────────────────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', async () => {
  const serverUrl = document.getElementById('server-url').value.trim().replace(/\/+$/, '');
  const roomCode = document.getElementById('room-code').value.trim().toUpperCase();
  const token = document.getElementById('jwt-token').value.trim();
  const guestName = document.getElementById('guest-name').value.trim() || 'TestUser';

  if (!roomCode) { log('Enter a room code', 'error'); return; }

  // Get local media first
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    log('Camera & microphone acquired', 'success');
    addVideoTile('local', guestName, localStream, true);
    enableMediaControls(true);
  } catch (e) {
    log(`Media error: ${e.message} — continuing without camera`, 'warn');
    localStream = null;
  }

  // Connect socket
  const signalingUrl = `${serverUrl}/signaling`;
  log(`Connecting to ${signalingUrl}…`);
  socket = io(signalingUrl, { transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    setStatus('connected', 'connected');
    log(`Socket connected: ${socket.id}`, 'success');

    socket.emit('join:room', {
      roomCode,
      token: token || undefined,
      guestName: token ? undefined : guestName,
    });
  });

  socket.on('connect_error', (e) => {
    setStatus('error', 'error');
    log(`Connection failed: ${e.message}`, 'error');
  });

  socket.on('disconnect', () => {
    setStatus('', 'disconnected');
    log('Disconnected from server', 'warn');
  });

  // ── ROOM EVENTS ──
  socket.on('room:joined', async ({ roomId, roomCode: rc, roomName, peers, rtpCapabilities, existingProducers, locationSharers, recordingStatus }) => {
    currentRoomId   = roomId;
    currentRoomCode = rc;
    log(`Joined room "${roomName}" (${rc}) — ${peers.length} peer(s) already here`, 'success');
    document.getElementById('room-info').innerHTML = `Room: <span>${rc}</span> · ${roomName}`;
    document.getElementById('btn-join').disabled      = true;
    document.getElementById('btn-leave').disabled     = false;
    document.getElementById('chat-input').disabled    = false;
    document.getElementById('btn-chat').disabled      = false;
    document.getElementById('btn-loc-share').disabled = false;
    document.getElementById('btn-rec-start').disabled = false;

    // Seed peer metadata for existing peers
    for (const peer of peers) peerMeta[peer.socketId] = peer;
    renderPeers();

    // Init map
    initMap();

    // Render existing location sharers
    if (locationSharers?.length) {
      for (const s of locationSharers) {
        if (s.lastLocation) {
          updatePeerMarker(s.socketId, s.name, s.lastLocation.latitude, s.lastLocation.longitude, s.lastLocation.accuracy, s.lastLocation.timestamp);
          log(`${s.name} is already sharing location`, 'info');
        }
      }
      fitMapToAll();
    }

    // Recording already active
    if (recordingStatus?.active) {
      log('⏺ Recording already active in this room', 'warn');
      setRecordingUI('recording', `Path: <span>${recordingStatus.path}</span>`);
      document.getElementById('btn-rec-start').style.display = 'none';
      document.getElementById('btn-rec-stop').style.display  = '';
      document.getElementById('btn-rec-stop').disabled       = false;
    }

    // ── SFU setup ────────────────────────────────────────────────────────
    // Wait for mediasoup-client ESM module to finish loading if not ready yet
    if (!window.mediasoupClient) {
      await new Promise(resolve => window.addEventListener('mediasoup-ready', resolve, { once: true }));
    }
    try {
      // Resolve RTP capabilities: prefer room:joined payload, fall back to
      // callback-style emit + multiple push-event names (mirrors useMonitoringRoom hook).
      const rtpCaps = await new Promise((resolve, reject) => {
        const done = (caps) => {
          if (caps && typeof caps === 'object') resolve(caps);
          else reject(new Error(`RTP capabilities invalid: ${JSON.stringify(caps)}`));
        };

        // Pattern 1: already in room:joined payload (most common)
        if (rtpCapabilities) { resolve(rtpCapabilities); return; }

        // Pattern 2: callback-style (mediasoup-demo default)
        socket.emit('getRouterRtpCapabilities', done);

        // Pattern 3: push events
        socket.once('routerRtpCapabilities', done);
        socket.once('router:rtp-capabilities', done);
        socket.once('rtp-capabilities', done);
      });

      await loadDevice(rtpCaps);

      // Send and recv transports run sequentially — parallel causes race conditions
      // on the direction-matching listeners
      await createSendTransport();
      await createRecvTransport();  // recv MUST be ready before subscribing

      // Subscribe to existing producers AFTER recv transport is fully ready.
      // existingProducers excludes our own producers (server filters them out).
      if (existingProducers?.length) {
        log(`Subscribing to ${existingProducers.length} existing producer(s)…`, 'info');
        for (const { producerId, socketId, kind } of existingProducers) {
          log(`Subscribing to existing ${kind} from ${socketId.slice(0,8)}`, 'signal');
          await subscribeToProducer(producerId, socketId, kind);
        }
      }
    } catch (err) {
      log(`SFU setup error: ${err.message}`, 'error');
      console.error('SFU setup error:', err);
    }
  });

  // ── PEER PRESENCE ──
  socket.on('peer:joined', ({ socketId, name, isMuted, isVideoOff, isScreenSharing: ss }) => {
    log(`Peer joined: ${name} (${socketId.slice(0,8)})`, 'info');
    peerMeta[socketId] = { name, isMuted, isVideoOff, isScreenSharing: ss };
    // Placeholder tile — actual track arrives via producer:new shortly after
    if (!document.getElementById(`tile-${socketId}`)) {
      addVideoTile(socketId, name, null);
    }
    renderPeers();
  });

  socket.on('peer:left', ({ socketId, name }) => {
    log(`Peer left: ${name} (${socketId.slice(0,8)})`, 'warn');
    closePeer(socketId);
    removePeerMarker(socketId);
  });

  socket.on('peer:media-state', ({ socketId, isMuted, isVideoOff, isScreenSharing: ss }) => {
    if (peerMeta[socketId]) {
      if (isMuted    !== undefined) peerMeta[socketId].isMuted         = isMuted;
      if (isVideoOff !== undefined) peerMeta[socketId].isVideoOff      = isVideoOff;
      if (ss         !== undefined) peerMeta[socketId].isScreenSharing = ss;
    }
    updateTileBadges(socketId,
      peerMeta[socketId]?.isMuted,
      peerMeta[socketId]?.isVideoOff,
      peerMeta[socketId]?.isScreenSharing);
    renderPeers();
  });

  // ── SFU: new producer from a peer ──
  socket.on('producer:new', async ({ producerId, socketId, name, kind }) => {
    log(`← New ${kind} producer from ${name} (${socketId.slice(0,8)})`, 'signal');
    // Ensure peer is in peerMeta even if peer:joined arrived out of order
    if (!peerMeta[socketId]) {
      peerMeta[socketId] = { name };
      if (!document.getElementById(`tile-${socketId}`)) {
        addVideoTile(socketId, name, null);
      }
      renderPeers();
    }
    if (!device || !recvTransport) {
      log('Device/transport not ready — cannot subscribe yet', 'warn');
      return;
    }
    await subscribeToProducer(producerId, socketId, kind);
  });

  socket.on('producer:removed', ({ producerIds }) => {
    if (!producerIds || !producerIds.length) return;
    log(`← Producer removed: ${producerIds.map(p => p.slice(0,8)).join(', ')}`, 'warn');
    for (const pid of producerIds) {
      for (const [cid, consumer] of Object.entries(consumers)) {
        if (consumer && consumer.producerId === pid) {
          try { consumer.close(); } catch (_) {}
          delete consumers[cid];
          log(`Closed consumer ${cid} for removed producer ${pid.slice(0,8)}`, 'info');
        }
      }
    }

    // Clean up any tiles that no longer have active remote tracks
    document.querySelectorAll('.video-tile').forEach(tile => {
      if (tile.id === 'tile-local') return;
      const v = tile.querySelector('video');
      if (!v || !v.srcObject) return;
      const s = v.srcObject;
      const activeRemote = Array.from(s.getTracks()).some(t => t.readyState !== 'ended');
      if (!activeRemote) {
        const sid = tile.id.replace('tile-','');
        removeVideoTile(sid);
      }
    });
  });

  socket.on('consumer:closed', ({ consumerId }) => {
    if (!consumerId) return;
    if (consumers[consumerId]) {
      try { consumers[consumerId].close(); } catch (_) {}
      delete consumers[consumerId];
      log(`Consumer closed by server: ${consumerId}`, 'info');
    }
  });

  // ── CHAT ──
  socket.on('chat:message', ({ name, message, timestamp }) => {
    log(`💬 ${name}: ${message}`, 'info');
  });

  // ── LOCATION EVENTS ──
  socket.on('location:update', ({ socketId, name, latitude, longitude, accuracy, timestamp }) => {
    updatePeerMarker(socketId, name, latitude, longitude, accuracy, timestamp);
    // Auto-switch to map tab if it's the first update from this peer
    if (!peerMarkers[socketId]) switchTab('map');
  });

  socket.on('location:stopped', ({ socketId, name }) => {
    log(`📍 ${name} stopped sharing location`, 'warn');
    removePeerMarker(socketId);
  });

  socket.on('location:ack', ({ mode, timestamp }) => {
    log(`Location sharing active (${mode} mode)`, 'success');
  });

  socket.on('location:current-positions', ({ positions }) => {
    for (const p of positions) {
      updatePeerMarker(p.socketId, p.name, p.latitude, p.longitude, p.accuracy, p.timestamp);
    }
    fitMapToAll();
  });


  // ── RECORDING EVENTS ──
  socket.on('recording:started', ({ roomId, recordingPath: path, timestamp }) => {
    isRecording = true;
    recordingPath = path;
    recordingStartTime = new Date(timestamp);
    log(`⏺ Recording started — ${path}`, 'success');
    setRecordingUI('recording', `Path: <span>${path}</span>`);
    startRecordingTimer();
  });

  socket.on('recording:stopped', ({ roomId, recordingPath: path, duration }) => {
    isRecording = false;
    recordingPath = path;
    stopRecordingTimer();
    const dur = duration ? `${Math.round(duration)}s` : '—';
    log(`⏹ Recording stopped — duration: ${dur}`, 'warn');
    setRecordingUI('idle', `Path: <span>${path}</span><br>Duration: <span>${dur}</span>`);
    document.getElementById('btn-rec-upload').style.display = '';
    document.getElementById('btn-rec-upload').disabled = false;
  });

  socket.on('recording:uploading', ({ roomId, recordingPath: path }) => {
    log(`☁ Uploading recording…`, 'info');
    setRecordingUI('uploading', `Uploading <span>${path}</span>…`);
    document.getElementById('btn-rec-upload').disabled = true;
  });

  socket.on('recording:uploaded', ({ roomId, s3Url }) => {
    lastS3Url = s3Url;
    log(`✅ Uploaded to S3: ${s3Url}`, 'success');
    setRecordingUI('idle', `S3: <a href="${s3Url}" target="_blank">${s3Url}</a>`);
    document.getElementById('btn-rec-upload').style.display = 'none';
  });

  socket.on('recording:upload-failed', ({ error }) => {
    log(`Upload failed: ${error}`, 'error');
    setRecordingUI('idle', `Upload failed: <span style="color:var(--danger)">${error}</span>`);
    document.getElementById('btn-rec-upload').disabled = false;
  });

  socket.on('recording:start:ack', ({ status, recordingId }) => {
    log(`Recording ack: ${status} (id: ${recordingId})`, 'success');
  });

  socket.on('recording:stop:ack', ({ status, metadata }) => {
    log(`Recording stop ack: ${status}`, 'info');
  });

  socket.on('recording:upload:ack', ({ status, s3Url }) => {
    log(`Upload ack: ${status} → ${s3Url}`, 'success');
  });

  socket.on('call:ended', ({ roomId, reason, initiatedBy }) => {
    const who = initiatedBy ? `by ${initiatedBy.slice(0,8)}` : '';
    log(`📵 Call ended ${who} — reason: ${reason}`, 'warn');
    if (isRecording) stopRecordingTimer();
    // Give user a moment to see the message before resetting
    setTimeout(() => resetState(), 2000);
  });

  socket.on('error', ({ message }) => {
    log(`Server error: ${message}`, 'error');
  });

  socket.on('room:left', () => {
    log('Left room', 'warn');
    resetState();
  });
});

// ─────────────────────────────────────────────────────────
// LEAVE
// ─────────────────────────────────────────────────────────
document.getElementById('btn-leave').addEventListener('click', () => {
  if (socket) socket.emit('leave:room');
  resetState();
});

function resetState() {
  // Stop location sharing
  if (isLocationSharing) stopLocationSharing();

  // Clean up peer markers
  for (const sid of Object.keys(peerMarkers)) removePeerMarker(sid);
  document.getElementById('btn-loc-share').disabled = true;
  document.getElementById('btn-loc-stop').style.display = 'none';
  document.getElementById('btn-loc-share').style.display = '';
  document.getElementById('peer-loc-list').innerHTML = '<p style="font-size:0.7rem;color:var(--muted);">None yet</p>';

  // Stop recording if active
  if (isRecording) {
    if (socket) socket.emit('recording:stop', { roomId: currentRoomId });
    isRecording = false;
  }
  stopRecordingTimer();
  recordingPath = null;
  lastS3Url = null;
  setRecordingUI('idle', '—');
  document.getElementById('btn-rec-start').disabled = true;
  document.getElementById('btn-rec-stop').style.display = 'none';
  document.getElementById('btn-rec-start').style.display = '';
  document.getElementById('btn-rec-upload').style.display = 'none';

  // Close SFU transports
  closeSfuTransports();
  for (const sid of Object.keys(peerMeta)) closePeer(sid);

  // Stop local stream
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  removeVideoTile('local');
  if (socket) { socket.disconnect(); socket = null; }

  currentRoomId = null;
  currentRoomCode = null;
  setStatus('', 'disconnected');
  document.getElementById('btn-join').disabled = false;
  document.getElementById('btn-leave').disabled = true;
  document.getElementById('chat-input').disabled = true;
  document.getElementById('btn-chat').disabled = true;
  document.getElementById('room-info').textContent = 'Not in a room';
  document.getElementById('peer-stat').textContent = '0 peers';
  document.getElementById('peer-count').textContent = '0';
  document.getElementById('peers-list').innerHTML = '';
  enableMediaControls(false);
  log('─── Session ended ───', 'warn');
}

// ─────────────────────────────────────────────────────────
// MEDIA CONTROLS
// ─────────────────────────────────────────────────────────
function enableMediaControls(on) {
  document.getElementById('btn-cam').disabled = !on;
  document.getElementById('btn-mic').disabled = !on;
  document.getElementById('btn-screen').disabled = !on;
  if (on) {
    document.getElementById('btn-cam').classList.add('active');
    document.getElementById('btn-mic').classList.add('active');
  } else {
    document.getElementById('btn-cam').classList.remove('active', 'muted-active');
    document.getElementById('btn-mic').classList.remove('active', 'muted-active');
    document.getElementById('btn-screen').classList.remove('active');
  }
}

document.getElementById('btn-cam').addEventListener('click', () => {
  if (!localStream) return;
  const track = localStream.getVideoTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  const btn = document.getElementById('btn-cam');
  btn.classList.toggle('active', track.enabled);
  btn.classList.toggle('muted-active', !track.enabled);
  if (socket) socket.emit('media:state', { isVideoOff: !track.enabled });
  log(`Camera ${track.enabled ? 'on' : 'off'}`, 'info');
});

document.getElementById('btn-mic').addEventListener('click', () => {
  if (!localStream) return;
  const track = localStream.getAudioTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  const btn = document.getElementById('btn-mic');
  btn.classList.toggle('active', track.enabled);
  btn.classList.toggle('muted-active', !track.enabled);
  if (socket) socket.emit('media:state', { isMuted: !track.enabled });
  log(`Mic ${track.enabled ? 'on' : 'off'}`, 'info');
});

document.getElementById('btn-screen').addEventListener('click', async () => {
  if (!isScreenSharing) {
    try {
      const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      const screenTrack = screenStream.getVideoTracks()[0];

      // Replace video track in all peer connections
      for (const pc of Object.values(peerConns)) {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(screenTrack);
      }

      // Update local preview
      const localTile = document.getElementById('tile-local');
      if (localTile) localTile.querySelector('video').srcObject = screenStream;

      screenTrack.onended = () => stopScreenShare();
      isScreenSharing = true;
      document.getElementById('btn-screen').classList.add('active');
      if (socket) socket.emit('media:state', { isScreenSharing: true });
      log('Screen share started', 'success');
    } catch (e) {
      log(`Screen share error: ${e.message}`, 'error');
    }
  } else {
    stopScreenShare();
  }
});

async function stopScreenShare() {
  if (!localStream) return;
  const camTrack = localStream.getVideoTracks()[0];
  for (const pc of Object.values(peerConns)) {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender && camTrack) sender.replaceTrack(camTrack);
  }
  const localTile = document.getElementById('tile-local');
  if (localTile) localTile.querySelector('video').srcObject = localStream;
  isScreenSharing = false;
  document.getElementById('btn-screen').classList.remove('active');
  if (socket) socket.emit('media:state', { isScreenSharing: false });
  log('Screen share stopped', 'info');
}

// ─────────────────────────────────────────────────────────
// CHAT
// ─────────────────────────────────────────────────────────
document.getElementById('btn-chat').addEventListener('click', sendChat);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !socket) return;
  socket.emit('chat:message', { message: msg });
  log(`💬 You: ${msg}`, 'info');
  input.value = '';
}


// ─────────────────────────────────────────────────────────
// RECORDING CONTROLS
// ─────────────────────────────────────────────────────────
function setRecordingUI(state, metaHtml) {
  const dot = document.getElementById('rec-dot');
  const label = document.getElementById('rec-status-label');
  const meta = document.getElementById('rec-meta');
  dot.className = 'rec-dot' + (state !== 'idle' ? ' ' + state : '');
  label.textContent = state;
  if (metaHtml !== undefined) meta.innerHTML = metaHtml;
}

function startRecordingTimer() {
  const timerEl = document.getElementById('rec-timer');
  timerEl.classList.add('active');
  recordingTimerInterval = setInterval(() => {
    if (!recordingStartTime) return;
    const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    timerEl.textContent = `${h}:${m}:${s}`;
  }, 1000);
}

function stopRecordingTimer() {
  clearInterval(recordingTimerInterval);
  recordingTimerInterval = null;
  const timerEl = document.getElementById('rec-timer');
  timerEl.classList.remove('active');
  timerEl.textContent = '00:00:00';
}

document.getElementById('btn-rec-start').addEventListener('click', () => {
  if (!socket || !currentRoomId) return;
  log('⏺ Starting recording…');
  socket.emit('recording:start', { roomId: currentRoomId });
  document.getElementById('btn-rec-start').style.display = 'none';
  document.getElementById('btn-rec-stop').style.display = '';
  document.getElementById('btn-rec-stop').disabled = false;
});

document.getElementById('btn-rec-stop').addEventListener('click', () => {
  if (!socket || !currentRoomId) return;
  log('⏹ Stopping recording…');
  // Pass upload:true — automatically upload once recording stops
  socket.emit('recording:stop', { roomId: currentRoomId, upload: true });
  document.getElementById('btn-rec-stop').style.display = 'none';
  document.getElementById('btn-rec-start').style.display = '';
  document.getElementById('btn-rec-start').disabled = false;
});

document.getElementById('btn-rec-upload').addEventListener('click', () => {
  if (!socket || !currentRoomId || !recordingPath) {
    log('No recording path available to upload', 'error');
    return;
  }
  log('☁ Uploading to S3…');
  socket.emit('recording:upload', {
    roomId: currentRoomId,
    recordingPath,
    deleteLocal: true,
  });
  document.getElementById('btn-rec-upload').disabled = true;
});

// ─────────────────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────────────────
let activeTab = 'video';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'map' && map) {
    setTimeout(() => map.invalidateSize(), 50);
  }
}

// ─────────────────────────────────────────────────────────
// LOCATION STATE
// ─────────────────────────────────────────────────────────
let map = null;
let geoWatchId = null;
let isLocationSharing = false;
let myMarker = null;
let myAccuracyCircle = null;
let myCurrentPos = null;

// socketId → { marker, accuracyCircle, name, lastUpdate }
const peerMarkers = {};

// ─────────────────────────────────────────────────────────
// INIT MAP (called once after joining a room)
// ─────────────────────────────────────────────────────────
function initMap() {
  if (map) return;
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView([0, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(map);

  // Attribution in corner
  L.control.attribution({ prefix: false })
    .addAttribution('© OpenStreetMap')
    .addTo(map);
}

// ─────────────────────────────────────────────────────────
// MY MARKER (pulsing green)
// ─────────────────────────────────────────────────────────
function getMyIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:#00ff88;border:2px solid #000;
      box-shadow:0 0 0 4px rgba(0,255,136,0.25);
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

function getPeerIcon(name) {
  const initials = name.slice(0, 2).toUpperCase();
  return L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;border-radius:50%;
      background:#ff6b35;border:2px solid #fff;
      display:flex;align-items:center;justify-content:center;
      font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
    ">${initials}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
  });
}

// ─────────────────────────────────────────────────────────
// UPDATE MY POSITION ON MAP + SIDEBAR
// ─────────────────────────────────────────────────────────
function updateMyPositionOnMap(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  myCurrentPos = { lat, lng, accuracy };

  if (!map) return;

  if (!myMarker) {
    myMarker = L.marker([lat, lng], { icon: getMyIcon(), zIndexOffset: 1000 }).addTo(map);
    myMarker.bindPopup(`<div class="popup-name">You</div><div class="popup-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>`);
  } else {
    myMarker.setLatLng([lat, lng]);
    myMarker.getPopup()?.setContent(`<div class="popup-name">You</div><div class="popup-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>`);
  }

  if (accuracy) {
    if (!myAccuracyCircle) {
      myAccuracyCircle = L.circle([lat, lng], { radius: accuracy, color: '#00ff88', fillColor: '#00ff88', fillOpacity: 0.06, weight: 1 }).addTo(map);
    } else {
      myAccuracyCircle.setLatLng([lat, lng]).setRadius(accuracy);
    }
  }

  // Update coords display in sidebar
  const el = document.getElementById('loc-coords');
  el.innerHTML = `Lat: <span>${lat.toFixed(6)}</span><br>Lng: <span>${lng.toFixed(6)}</span>${accuracy ? `<br>Acc: <span>±${Math.round(accuracy)}m</span>` : ''}`;
}

// ─────────────────────────────────────────────────────────
// UPDATE PEER MARKER
// ─────────────────────────────────────────────────────────
function updatePeerMarker(socketId, name, lat, lng, accuracy, timestamp) {
  if (!map) return;

  const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString() : '';
  const popupHtml = `
    <div class="popup-name">${name}</div>
    <div class="popup-coords">Lat: ${parseFloat(lat).toFixed(6)}<br>Lng: ${parseFloat(lng).toFixed(6)}</div>
    ${timeStr ? `<div class="popup-time">Updated: ${timeStr}</div>` : ''}
  `;

  if (!peerMarkers[socketId]) {
    const marker = L.marker([lat, lng], { icon: getPeerIcon(name) }).addTo(map);
    marker.bindPopup(popupHtml);
    const circle = accuracy
      ? L.circle([lat, lng], { radius: accuracy, color: '#ff6b35', fillColor: '#ff6b35', fillOpacity: 0.06, weight: 1 }).addTo(map)
      : null;
    peerMarkers[socketId] = { marker, circle, name, lastUpdate: timestamp };
  } else {
    peerMarkers[socketId].marker.setLatLng([lat, lng]);
    peerMarkers[socketId].marker.getPopup()?.setContent(popupHtml);
    if (accuracy && peerMarkers[socketId].circle) {
      peerMarkers[socketId].circle.setLatLng([lat, lng]).setRadius(accuracy);
    }
    peerMarkers[socketId].lastUpdate = timestamp;
  }

  renderPeerLocList();
}

function removePeerMarker(socketId) {
  if (peerMarkers[socketId]) {
    peerMarkers[socketId].marker.remove();
    peerMarkers[socketId].circle?.remove();
    delete peerMarkers[socketId];
  }
  renderPeerLocList();
}

// ─────────────────────────────────────────────────────────
// PEER LOCATION SIDEBAR LIST
// ─────────────────────────────────────────────────────────
function renderPeerLocList() {
  const el = document.getElementById('peer-loc-list');
  const entries = Object.entries(peerMarkers);
  if (!entries.length) {
    el.innerHTML = '<p style="font-size:0.7rem;color:var(--muted);">None yet</p>';
    return;
  }
  el.innerHTML = entries.map(([sid, data]) => {
    const latlng = data.marker.getLatLng();
    const time = data.lastUpdate ? new Date(data.lastUpdate).toLocaleTimeString() : '';
    return `<div class="peer-loc-item" onclick="flyToPeer('${sid}')">
      <span class="peer-loc-icon">📍</span>
      <div style="flex:1;min-width:0;">
        <div class="peer-loc-name">${data.name}</div>
        <div class="peer-loc-coords">${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}</div>
        ${time ? `<div style="font-size:0.6rem;color:var(--muted)">${time}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function flyToPeer(socketId) {
  if (!map || !peerMarkers[socketId]) return;
  const latlng = peerMarkers[socketId].marker.getLatLng();
  map.flyTo(latlng, 15, { duration: 1.2 });
  peerMarkers[socketId].marker.openPopup();
  switchTab('map');
}

// ─────────────────────────────────────────────────────────
// FIT MAP TO ALL MARKERS
// ─────────────────────────────────────────────────────────
function fitMapToAll() {
  if (!map) return;
  const points = [];
  if (myMarker) points.push(myMarker.getLatLng());
  Object.values(peerMarkers).forEach(p => points.push(p.marker.getLatLng()));
  if (points.length === 1) {
    map.setView(points[0], 15);
  } else if (points.length > 1) {
    map.fitBounds(L.latLngBounds(points).pad(0.2));
  }
}

// ─────────────────────────────────────────────────────────
// START SHARING LOCATION TO ROOM
// ─────────────────────────────────────────────────────────
function startLocationSharing() {
  if (!socket || !currentRoomId) {
    log('Join a room first before sharing location', 'error');
    return;
  }

  if (!navigator.geolocation) {
    log('Geolocation not supported by this browser', 'error');
    document.getElementById('loc-dot').classList.add('error');
    document.getElementById('loc-status-label').textContent = 'not supported';
    return;
  }

  log('Requesting location permission…');
  document.getElementById('loc-status-label').textContent = 'waiting for GPS…';

  // Get first fix, then emit location:start
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      isLocationSharing = true;
      updateMyPositionOnMap(pos);

      // Emit location:start (broadcast to room — no targetSocketIds)
      socket.emit('location:start', {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        altitude: pos.coords.altitude,
        speed: pos.coords.speed,
        heading: pos.coords.heading,
      });

      log(`Location sharing started — broadcasting to room`, 'success');
      document.getElementById('loc-dot').classList.add('sharing');
      document.getElementById('loc-status-label').textContent = 'sharing to room';
      document.getElementById('btn-loc-share').style.display = 'none';
      document.getElementById('btn-loc-stop').style.display = '';

      // Centre map on my position
      if (map) map.setView([pos.coords.latitude, pos.coords.longitude], 15);
      switchTab('map');

      // Start watching for updates
      geoWatchId = navigator.geolocation.watchPosition(
        (updatedPos) => {
          updateMyPositionOnMap(updatedPos);
          if (socket && isLocationSharing) {
            socket.emit('location:update', {
              latitude: updatedPos.coords.latitude,
              longitude: updatedPos.coords.longitude,
              accuracy: updatedPos.coords.accuracy,
              altitude: updatedPos.coords.altitude,
              speed: updatedPos.coords.speed,
              heading: updatedPos.coords.heading,
            });
          }
        },
        (err) => log(`GPS error: ${err.message}`, 'warn'),
        { enableHighAccuracy: true, maximumAge: 5000 }
      );
    },
    (err) => {
      const reason = err.code === 1 ? 'permission denied' : err.code === 2 ? 'position unavailable' : 'timeout';
      log(`Location error (code ${err.code}): ${err.message}`, 'error');
      document.getElementById('loc-dot').classList.add('error');
      document.getElementById('loc-status-label').textContent = reason;
    },
    { enableHighAccuracy: false, timeout: 10000 }
  );
}

// ─────────────────────────────────────────────────────────
// STOP SHARING
// ─────────────────────────────────────────────────────────
function stopLocationSharing() {
  isLocationSharing = false;

  if (geoWatchId !== null) {
    navigator.geolocation.clearWatch(geoWatchId);
    geoWatchId = null;
  }

  if (socket) socket.emit('location:stop');

  document.getElementById('loc-dot').classList.remove('sharing', 'error');
  document.getElementById('loc-status-label').textContent = 'not sharing';
  document.getElementById('btn-loc-share').style.display = '';
  document.getElementById('btn-loc-stop').style.display = 'none';
  document.getElementById('loc-coords').innerHTML = '—';

  if (myMarker) { myMarker.remove(); myMarker = null; }
  if (myAccuracyCircle) { myAccuracyCircle.remove(); myAccuracyCircle = null; }

  log('Location sharing stopped', 'warn');
}

// ─────────────────────────────────────────────────────────
// LOCATION BUTTON WIRING
// ─────────────────────────────────────────────────────────
document.getElementById('btn-loc-share').addEventListener('click', startLocationSharing);
document.getElementById('btn-loc-stop').addEventListener('click', stopLocationSharing);

</script>
